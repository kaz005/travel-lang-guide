<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tourist Spots Guide</title>
    <link href="https://cdn.replit.com/agent/bootstrap-agent-dark-theme.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/custom.css') }}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="language-selector">
        <span class="flag-icon lang-select {% if current_lang == 'ja' %}active{% endif %}" 
              data-lang="ja" 
              data-bs-toggle="tooltip" 
              title="日本語">
            🇯🇵
        </span>
        <span class="flag-icon lang-select {% if current_lang == 'en' %}active{% endif %}" 
              data-lang="en" 
              data-bs-toggle="tooltip" 
              title="English">
            🇺🇸
        </span>
        <span class="flag-icon lang-select {% if current_lang == 'zh' %}active{% endif %}" 
              data-lang="zh" 
              data-bs-toggle="tooltip" 
              title="中文">
            🇨🇳
        </span>
    </div>

    <div class="container py-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
